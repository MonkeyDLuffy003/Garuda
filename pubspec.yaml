name: garuda
description: Garuda Research Voice Agent Bot

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  flutter_spinkit: ^5.2.0
  intl: ^0.18.1

dev_dependencies:
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/garuda_logo.png"
  adaptive_icon_background: "#0D5C6E"
  adaptive_icon_foreground: "assets/images/garuda_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/garuda_logo
