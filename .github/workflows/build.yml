name: Build Garuda Flutter APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Scaffold full Flutter project
        run: |
          flutter create -t app scaffold_app --project-name garuda
          cp -r scaffold_app/android ./android
          cp -r scaffold_app/ios ./ios
          cp -r scaffold_app/web ./web
          rm -rf scaffold_app

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: garuda-flutter-apk
          path: build/app/outputs/flutter-apk/app-release.apk
